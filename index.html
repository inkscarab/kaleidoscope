<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Двойной Калейдоскоп</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const img1 = new Image();
const img2 = new Image();
img1.src = 'photo1.jpg'; // Первое фото
img2.src = 'photo2.jpg'; // Второе фото

let loaded = 0;
[img1, img2].forEach(img => img.onload = () => {
    loaded++;
    if(loaded === 2) { resize(); draw(); }
});

let width, height, radius;
const slices = 12; 

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    radius = Math.sqrt(width**2 + height**2) / 1.5;
}

window.addEventListener('resize', resize);

let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});
// Поддержка касаний для телефонов
window.addEventListener('touchmove', e => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
});

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, width, height);
    
    const step = (Math.PI * 2) / slices;
    const cx = width / 2;
    const cy = height / 2;

    for (let i = 0; i < slices; i++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(i * step);

        // Маска-треугольник
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(radius, -step * radius / 2);
        ctx.lineTo(radius, step * radius / 2);
        ctx.closePath();
        ctx.clip();

        // Чередуем фото: четные — первое, нечетные — второе
        const currentImg = (i % 2 === 0) ? img1 : img2;
        
        // Отражаем каждый второй сегмент, чтобы узоры стыковались
        if (i % 2 === 1) {
            ctx.scale(1, -1);
        }

        // Отрисовка фото
        const scale = 2; 
        ctx.drawImage(
            currentImg,
            (mouseX / width) * currentImg.width - 200, 
            (mouseY / height) * currentImg.height - 200,
            currentImg.width / scale, currentImg.height / scale,
            0, -radius, radius * 2, radius * 2
        );

        ctx.restore();
    }
    requestAnimationFrame(draw);
}
</script>
</body>
</html>
