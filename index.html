<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твой личный Калейдоскоп</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; cursor: crosshair; }
        .msg {
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: white;
            font-family: serif; font-size: 1.2rem;
            text-shadow: 0 0 10px black; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="msg">Двигай курсором, чтобы заглянуть в воспоминания</div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const img = new Image();

// --- НАСТРОЙКИ ---
img.src = 'photo.jpg'; // Укажи здесь имя своего файла с картинкой
const slices = 12; // Количество сегментов (лучше четное)
// -----------------

let width, height, radius;

img.onload = () => {
    resize();
    draw();
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    radius = Math.sqrt(width**2 + height**2) / 2;
}

window.addEventListener('resize', resize);

let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function draw() {
    ctx.clearRect(0, 0, width, height);
    
    const step = (Math.PI * 2) / slices;
    const cx = width / 2;
    const cy = height / 2;

    for (let i = 0; i < slices; i++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(i * step);

        // Создаем треугольную маску для кусочка
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, -step/2, step/2);
        ctx.closePath();
        ctx.clip();

        // Отражаем каждый второй кусочек для симметрии
        if (i % 2 === 1) {
            ctx.scale(-1, 1);
        }

        // Рисуем часть изображения, привязанную к мышке
        const iw = img.width;
        const ih = img.height;
        const scale = 1.5; // Масштаб фото внутри кусочка
        
        ctx.drawImage(
            img, 
            mouseX - (iw/2), mouseY - (ih/2), iw/scale, ih/scale, // область забора
            0, -radius, radius * 2, radius * 2 // куда рисуем
        );

        ctx.restore();
    }
    
    requestAnimationFrame(draw);
}
</script>
</body>
</html>
